    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(145deg, #e9f0fa 0%, #f2f7fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* elegant card container */
        .registration-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 2rem auto;
        }

        .form-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -10px rgba(0,40,80,0.25), 0 0 0 1px rgba(21, 112, 239, 0.1);
            padding: 2.5rem 2.2rem;
            transition: all 0.2s ease;
        }

        .form-title {
            text-align: center;
            color: #0b2f4e;
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin-bottom: 1.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .form-title i {
            color: #1d4ed8;
            font-size: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1552b3;
            margin: 2rem 0 1.5rem 0;
            border-bottom: 2px solid rgba(21, 112, 239, 0.2);
            padding-bottom: 0.6rem;
        }

        .section-header i {
            color: #2563eb;
            font-size: 1.5rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .input-field {
            position: relative;
            width: 100%;
        }

        .input-field input, 
        .input-field select {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: white;
            transition: all 0.2s;
            outline: none;
            color: #0a1e3c;
        }

        .input-field select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%233b82f6" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.2rem;
        }

        .input-field label {
            position: absolute;
            left: 1rem;
            top: 0.9rem;
            color: #64748b;
            background: white;
            padding: 0 0.3rem;
            font-size: 1rem;
            transition: 0.2s ease all;
            pointer-events: none;
            font-weight: 450;
            line-height: 1;
        }

        .input-field input:focus,
        .input-field select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
        }

        .input-field input:focus ~ label,
        .input-field input:not(:placeholder-shown) ~ label,
        .input-field select:valid ~ label {
            top: -0.6rem;
            left: 0.8rem;
            font-size: 0.8rem;
            color: #2563eb;
            font-weight: 600;
            background: linear-gradient(white, white);
            border-radius: 0.5rem;
        }

        /* For time inputs (they have visible labels, different styling) */
        .time-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .time-item {
            flex: 1 1 200px;
        }

        .time-item label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.4rem;
            display: block;
            font-size: 0.9rem;
        }

        .time-item input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .time-item input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
            outline: none;
        }

        .file-upload {
            margin: 2rem 0 1rem;
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.5rem 1.2rem;
            border: 2px dashed #b9d3f8;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .file-upload label {
            background: #2563eb;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .file-upload label:hover {
            background: #1d4ed8;
        }

        .file-upload span {
            color: #334155;
            font-size: 0.95rem;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 3rem;
            padding: 1rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.15s;
            box-shadow: 0 10px 20px -8px #1e3a8a80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-register:hover {
            background: linear-gradient(145deg, #1d4ed8, #2563eb);
            transform: scale(1.02);
            box-shadow: 0 18px 25px -8px #0f2b7a;
        }

        /* social login */
        .social-divider {
            text-align: center;
            margin: 2.2rem 0 1.8rem;
            position: relative;
        }

        .social-divider span {
            background: white;
            padding: 0 1.2rem;
            color: #4b5565;
            font-weight: 500;
            font-size: 0.9rem;
            position: relative;
            z-index: 2;
        }

        .social-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b3c9f0, transparent);
            z-index: 1;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .social-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1.5px solid #e9eef3;
            border-radius: 3rem;
            padding: 0.6rem 1.5rem;
            background: white;
            transition: 0.15s;
            font-weight: 500;
        }

        .social-btn img {
            width: 22px;
            height: 22px;
        }

        .social-btn:hover {
            border-color: #2563eb;
            background: #f8fcff;
            box-shadow: 0 5px 12px rgba(0,60,130,0.1);
            transform: translateY(-2px);
        }

        .login-redirect {
            text-align: center;
            margin-top: 2rem;
            font-size: 1rem;
            color: #2c3e50;
        }

        .login-redirect a {
            color: #1d4ed8;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: 0.15s;
        }

        .login-redirect a:hover {
            border-bottom-color: #2563eb;
        }

        /* clinic address group (inline inputs) */
        .clinic-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.5rem 0 1rem;
        }

        .clinic-group .input-field {
            flex: 1 1 160px;
        }

        /* remove default placeholder of hidden labels */
        input::placeholder {
            color: transparent;
        }

        /* keep consistent spacing */
        .mb-1 { margin-bottom: 1rem; }
        .mt-2 { margin-top: 2rem; }

        /* responsive */
        @media (max-width: 680px) {
            body { padding: 0.5rem; }
            .form-card { padding: 1.5rem; }
            .grid-2 { grid-template-columns: 1fr; }
            .clinic-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="registration-wrapper">
        <div class="form-card">
            <!-- Title with icon -->
            <div class="form-title">
                <i class="fas fa-user-md"></i> 
                <span>Doctor Registration</span>
            </div>

            <form id="doctorRegistrationForm" method="POST" enctype="multipart/form-data">
                <!-- Personal Information -->
                <div class="section-header"><i class="fas fa-user-circle"></i> Personal information</div>
                <div class="grid-2">
                    <div class="input-field">
                        <input type="text" id="first_name" name="first_name" required placeholder=" ">
                        <label for="first_name">First Name</label>
                    </div>
                    <div class="input-field">
                        <input type="text" id="last_name" name="last_name" required placeholder=" ">
                        <label for="last_name">Last Name</label>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-field">
                        <input type="email" id="email" name="email" required placeholder=" ">
                        <label for="email">Email address</label>
                    </div>
                    <div class="input-field">
                        <input type="text" id="mobile" name="mobile" required pattern="[0-9]{10}" title="mobile number must be 10 digits" placeholder=" ">
                        <label for="mobile">Mobile Number</label>
                    </div>
                </div>

                <!-- Clinic address (styled as inline fields) -->
                <div class="section-header"><i class="fas fa-clinic-medical"></i> Clinic address</div>
                <div class="clinic-group">
                    <div class="input-field">
                        <input type="text" name="door_no" placeholder=" " required>
                        <label>Door No</label>
                    </div>
                    <div class="input-field">
                        <input type="text" name="area" placeholder=" " required>
                        <label>Area / Locality</label>
                    </div>
                    <div class="input-field">
                        <input type="text" name="city" placeholder=" " required>
                        <label>City</label>
                    </div>
                </div>
                <div class="clinic-group">
                    <div class="input-field">
                        <input type="text" name="state" placeholder=" " required>
                        <label>State</label>
                    </div>
                    <div class="input-field">
                        <input type="text" name="country" placeholder=" " required>
                        <label>Country</label>
                    </div>
                    <div class="input-field">
                        <input type="text" name="zipcode" placeholder=" " required>
                        <label>Zip Code</label>
                    </div>
                </div>

                <!-- Educational Background -->
                <div class="section-header"><i class="fas fa-graduation-cap"></i> Educational background</div>
                <div class="grid-2">
                    <div class="input-field">
                        <input type="text" id="degree" name="degree" required placeholder=" ">
                        <label for="degree">Degree (e.g., MBBS, MD)</label>
                    </div>
                    <div class="input-field">
                        <input type="text" id="university" name="university" required placeholder=" ">
                        <label for="university">University / Institution</label>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="input-field">
                        <input type="number" id="experience" name="experience" required placeholder=" ">
                        <label for="experience">Years of practice</label>
                    </div>
                    <div class="input-field">
                        <input type="text" id="aadhar_card" name="aadhar_card" required placeholder=" ">
                        <label for="aadhar_card">Aadhaar Number</label>
                    </div>
                </div>

                <!-- Professional Information -->
                <div class="section-header"><i class="fas fa-briefcase-medical"></i> Professional details</div>
                <div class="grid-2">
                    <div class="input-field">
                        <input type="text" id="license_number" name="license_number" required placeholder=" ">
                        <label for="license_number">Medical License No.</label>
                    </div>
                    <div class="input-field">
                        <input type="text" id="specialization" name="specialization" required placeholder=" ">
                        <label for="specialization">Specialization</label>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="input-field">
                        <input type="text" id="clinic" name="clinic" required placeholder=" ">
                        <label for="clinic">Clinic / Hospital name</label>
                    </div>
                    <div class="input-field">
                        <select id="availability" name="availability" required>
                            <option value="" disabled selected hidden></option>
                            <option value="Diagnostic Center">Diagnostic Center</option>
                            <option value="Online Only">Online Only</option>
                            <option value="Both">Both (Clinic & Online)</option>
                        </select>
                        <label for="availability">Available at</label>
                    </div>
                </div>

                <!-- Time range -->
                <div class="time-group">
                    <div class="time-item">
                        <label for="from_time">🕒 From time</label>
                        <input type="time" id="from_time" name="from_time" required>
                    </div>
                    <div class="time-item">
                        <label for="to_time">🕒 To time</label>
                        <input type="time" id="to_time" name="to_time" required>
                    </div>
                </div>

                <!-- Password fields -->
                <div class="grid-2" style="margin-top: 1.5rem;">
                    <div class="input-field">
                        <input type="password" id="password" name="password" required placeholder=" ">
                        <label for="password">Password</label>
                    </div>
                    <div class="input-field">
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder=" ">
                        <label for="confirm_password">Confirm password</label>
                    </div>
                </div>

                <!-- Profile image upload (styled) -->
                <div class="file-upload">
                    <label for="profile_image"><i class="fas fa-cloud-upload-alt"></i> Upload photo</label>
                    <span>JPG, PNG (max 5MB)</span>
                    <input type="file" id="profile_image" name="profile_image" accept="image/*" required>
                </div>

                <!-- Submit button -->
                <button type="submit" class="btn-register">
                    <i class="fas fa-check-circle"></i> Register
                </button>

                <!-- Social login (intact links) -->
                <div class="social-divider"><span>OR CONTINUE WITH</span></div>
                <div class="social-buttons">
                    <a href="https://accounts.google.com" target="_blank" class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
                        <span style="color:#000;">Google</span>
                    </a>
                    <a href="https://facebook.com" target="_blank" class="social-btn">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook">
                        <span style="color:#1877f2;">Facebook</span>
                    </a>
                    <a href="https://twitter.com" target="_blank" class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter">
                        <span style="color:#1da1f2;">Twitter</span>
                    </a>
                </div>

                <div class="login-redirect">
                    <p>Already registered? <a href="doctorlogin.html">Login here</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript (unchanged logic, only floating label + submit) -->
    <script>
        // floating label emulation (compatible with original behaviour)
        document.querySelectorAll('.input-field input, .input-field select').forEach(field => {
            const checkValue = () => {
                if (field.value) field.classList.add('filled');
                else field.classList.remove('filled');
            };
            field.addEventListener('input', checkValue);
            field.addEventListener('blur', checkValue);
            checkValue(); // on load
        });

        // Original exact submit handler (preserved)
        const form = document.getElementById('doctorRegistrationForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form); // includes image

            try {
                const res = await fetch('/api/doctors', {
                    method: 'POST',
                    body: formData   // send as multipart
                });

                const result = await res.json();
                alert(result.message);

                if (res.ok) {
                    window.location.href = "doctorlogin.html";
                }

            } catch (error) {
                console.error("Registration Error:", error);
                alert("Registration failed. Please try again.");
            }
        });
    </script>
    <!-- The background styling is updated but original fetch logic & social links remain untouched -->
</body>
