<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Find Healthcare Providers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Search for doctors and diagnostics -->
    <section class="bg-gradient-to-br from-blue-50 to-indigo-50 p-8" style="font-family: 'Inter', sans-serif;">
        <div class="max-w-5xl mx-auto bg-white rounded-xl border border-gray-200 shadow-lg px-8 py-10"> 
            <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Find Healthcare Providers</h2> 
            <p class="text-gray-600 text-center mb-8">Search for doctors and diagnostic centers near you</p> 
            <!-- Search Filters --> 
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4"> 
                <!-- Provider Type Dropdown --> 
                <div> 
                    <label for="provider-type" class="block text-gray-700 mb-2 font-medium">Provider Type</label>
                    <div class="relative"> 
                        <select id="provider-type" class="w-full bg-white text-gray-800 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none"> 
                            <option value="all">All Providers</option> 
                            <option value="doctor">Doctors Only</option> 
                            <option value="diagnostic">Diagnostics Only</option> 
                        </select> 
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700"> 
                            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"> 
                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /> 
                            </svg> 
                        </div> 
                    </div> 
                </div> 
                <!-- Country Dropdown --> 
                <div> 
                    <label for="country" class="block text-gray-700 mb-2 font-medium">Country</label> 
                    <div class="relative"> 
                        <select id="country" class="w-full bg-white text-gray-800 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none"> 
                            <option value="">Select Country</option> 
                        </select> <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700"> 
                            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"> 
                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /> 
                            </svg> 
                        </div> 
                    </div> 
                </div> 
                <!-- State Dropdown --> 
                <div> 
                    <label for="state" class="block text-gray-700 mb-2 font-medium">State</label> 
                    <div class="relative"> 
                        <select id="state" class="w-full bg-white text-gray-800 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none"> 
                            <option value="">Select State</option> 
                        </select> 
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700"> 
                            <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"> 
                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /> 
                            </svg> 
                        </div> 
                    </div> 
                </div> 
                <!-- Zip Code --> 
                <div> 
                    <label for="zipcode" class="block text-gray-700 mb-2 font-medium">Zip Code</label> 
                    <input type="text" id="zipcode" placeholder="Enter Zip Code" class="w-full bg-white text-gray-800 rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent"> 
                </div> 
                <!-- Search Button --> 
                <div class="flex flex-col justify-end"> 
                    <button id="search-button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-3 rounded-lg transition flex items-center justify-center shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-150"> 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"> 
                            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /> 
                        </svg> Search 
                    </button> 
                </div> 
            </div> 
            <!-- Loading Indicator --> 
            <div id="loading" class="mt-8 hidden"> 
                <div class="flex flex-col items-center justify-center py-8"> 
                    <div class="w-12 h-12 rounded-full bg-blue-100 animate-pulse flex items-center justify-center"> 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"> 
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /> 
                        </svg> 
                    </div> 
                    <p class="mt-4 text-gray-600">Searching providers...</p> 
                </div> 
            </div> 
            <!-- Results Section --> 
            <div id="results" class="mt-8 hidden"> 
                <div class="flex items-center justify-between mb-6"> 
                    <h3 id="results-count" class="text-xl font-semibold text-gray-800"></h3> 
                    <button id="clear-filters" class="text-sm text-blue-600 hover:text-blue-800 font-medium flex items-center"> 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"> 
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /> 
                        </svg> Clear filters 
                    </button> 
                </div> 
                <div id="area-filters" class="mb-6 flex flex-wrap gap-2"></div> 
                <div id="results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 overflow-y-auto max-h-[80vh]"></div> 
            </div> 
        </div> 
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let allProviders = [];
            let selectedArea = null;
            let displayedProviders = [];
            let locationData = {};
            let isLoading = false;
            let offset = 0;
            const BATCH_SIZE = 50;
            const CACHE_KEY = 'providersData_v6';
            const CACHE_EXPIRY_MS = 24 * 60 * 60 * 1000; // 24 hours
            // DOM elements
            const providerTypeSelect = document.getElementById('provider-type');
            const countrySelect = document.getElementById('country');
            const stateSelect = document.getElementById('state');
            const zipInput = document.getElementById('zipcode');
            const searchButton = document.getElementById('search-button');
            const resultsContainer = document.getElementById('results-container');
            const resultsCount = document.getElementById('results-count');
            const resultsSection = document.getElementById('results');
            const loadingSection = document.getElementById('loading');
            const clearFiltersBtn = document.getElementById('clear-filters');

            providerTypeSelect.addEventListener("change", () => {

                countrySelect.innerHTML = '<option value="">Select Country</option>';
                stateSelect.innerHTML = '<option value="">Select State</option>';

                loadCountries();

            });

            countrySelect.addEventListener("change", () => {
                const country = countrySelect.value;
                if (country) {
                    loadStates(country);
                }
            });
            // ✅ Hide results on initial page load
            resultsSection.classList.add('hidden');

            // Function to geocode an address
            const geocodeAddress = async (address) => {
                try {
                    const response = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${GOOGLE_API_KEY}`);
                    const data = await response.json();
                    if (data.status === "OK") {
                        const components = data.results[0].address_components;
                        const country = components.find(c => c.types.includes("country"))?.long_name || "";
                        const state = components.find(c => c.types.includes("administrative_area_level_1"))?.long_name || "";
                        const zip = components.find(c => c.types.includes("postal_code"))?.long_name || "";
                        return { country, state, zip };
                    }
                } catch (err) {
                    console.error("Geocoding error:", err);
                }
                return { country: "", state: "", zip: "" };
            };

            const loadCountries = async () => {

                const providerType = providerTypeSelect.value;

                let countries = [];

                if (providerType === "doctor") {

                    const res = await fetch("/api/doctor-countries");
                    countries = await res.json();

                } else if (providerType === "diagnostic") {

                    const res = await fetch("/api/diagnostic-countries");
                    countries = await res.json();

                } else {

                    const doctorRes = await fetch("/api/doctor-countries");
                    const doctorCountries = await doctorRes.json();

                    const diagRes = await fetch("/api/diagnostic-countries");
                    const diagCountries = await diagRes.json();

                    countries = [...doctorCountries, ...diagCountries];
                }

                countrySelect.innerHTML = '<option value="">Select Country</option>';

                const unique = [...new Set(countries.map(c => c.country))];

                unique.forEach(country => {
                    const option = new Option(country, country);
                    countrySelect.add(option);
                });
            };
            
            const loadStates = async (country) => {

                const providerType = providerTypeSelect.value;

                let states = [];

                if (providerType === "doctor") {

                    const res = await fetch(`/api/doctor-states?country=${country}`);
                    states = await res.json();

                } else if (providerType === "diagnostic") {

                    const res = await fetch(`/api/diagnostic-states?country=${country}`);
                    states = await res.json();

                } else {

                    const doctorRes = await fetch(`/api/doctor-states?country=${country}`);
                    const doctorStates = await doctorRes.json();

                    const diagRes = await fetch(`/api/diagnostic-states?country=${country}`);
                    const diagStates = await diagRes.json();

                    states = [...doctorStates, ...diagStates];
                }

                stateSelect.innerHTML = '<option value="">Select State</option>';

                const unique = [...new Set(states.map(s => s.state))];

                unique.forEach(state => {
                    const option = new Option(state, state);
                    stateSelect.add(option);
                });
            };
            
            const fetchAndAppendProviders = async () => {
                if (isLoading || offset >= displayedProviders.length) return;
                isLoading = true;
                // Add a small inline loading spinner at the bottom
                resultsContainer.insertAdjacentHTML('beforeend',
                    `<div id="load-more-spinner" class="col-span-full flex justify-center items-center py-4">
                        <div class="w-8 h-8 rounded-full bg-blue-100 animate-pulse flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                        </div>
                    </div>`
                );
                const nextBatch = displayedProviders.slice(offset, offset + BATCH_SIZE);
                displayProvidersBatch(nextBatch);
                offset += BATCH_SIZE;
                document.getElementById('load-more-spinner')?.remove();
                isLoading = false;
            };

            const loadAreaButtons = async () => {

                const providerType = providerTypeSelect.value;
                const country = countrySelect.value;
                const state = stateSelect.value;
                const zip = zipInput.value;

                let areas = [];

                if (providerType === "all" || providerType === "doctor") {

                    const res = await fetch(`https://www.24x7health.in/api/doctor-areas?country=${country}&state=${state}&zipcode=${zip}`);
                    const doctorAreas = await res.json();

                    doctorAreas.forEach(a => {
                        areas.push({ area: a.area, count: a.doctor_count });
                    });
                }

                if (providerType === "all" || providerType === "diagnostic") {

                    const res = await fetch(`https://www.24x7health.in/api/diagnostic-areas?country=${country}&state=${state}&zipcode=${zip}`);
                    const diagnosticAreas = await res.json();

                    diagnosticAreas.forEach(a => {
                        areas.push({ area: a.area, count: a.center_count });
                    });
                }

                const areaContainer = document.getElementById("area-filters");
                areaContainer.innerHTML = "";

                areas.forEach(a => {

                    const btn = document.createElement("button");

                    btn.textContent = `${a.area} (${a.count})`;

                    btn.className = "px-3 py-1 rounded-full text-sm transition";

                    if (selectedArea === a.area) {

                        btn.classList.add("bg-blue-600", "text-white");

                    } else {

                        btn.classList.add(
                            "bg-blue-100",
                            "text-blue-700",
                            "hover:bg-blue-600",
                            "hover:text-white"
                        );

                    }

                    btn.onclick = () => filterByArea(a.area);

                    areaContainer.appendChild(btn);

                });
            };
            
            
            const filterByArea = async (area) => {

                selectedArea = area;

                const providerType = providerTypeSelect.value;
                const country = countrySelect.value;
                const state = stateSelect.value;
                const zip = zipInput.value;

                let doctors = [];
                let diagnostics = [];

                if (providerType === "all" || providerType === "doctor") {

                    const res = await fetch(`/api/doctors/search?country=${country}&state=${state}&zipcode=${zip}&area=${area}`);
                    const data = await res.json();

                    doctors = data.map(d => ({
                        id: d.uid,
                        type: "doctor",
                        name: `Dr. ${d.first_name} ${d.last_name}`,
                        specialization: d.specialization,
                        clinic: d.clinic,
                        area: d.area,
                        address: `${d.door_no}, ${d.area}, ${d.city}, ${d.state}, ${d.country} - ${d.zipcode}`
                    }));
                }

                if (providerType === "all" || providerType === "diagnostic") {

                    const res = await fetch(`/api/diagnostics/search?country=${country}&state=${state}&zipcode=${zip}&area=${area}`);
                    const data = await res.json();

                    diagnostics = data.map(d => ({
                        id: d.center_id,
                        type: "diagnostic",
                        name: d.center_name,
                        services: JSON.parse(d.services || "[]"),
                        area: d.area,
                        address: `${d.address}, ${d.area}, ${d.city}, ${d.state}, ${d.country} - ${d.pincode}`
                    }));
                }

                displayedProviders = [...doctors, ...diagnostics];

                offset = 0;
                resultsContainer.innerHTML = "";

                displayProvidersBatch(displayedProviders.slice(0, BATCH_SIZE));
                await loadAreaButtons();

            };
                        
            const displayProvidersBatch = (providers) => {
                resultsSection.classList.remove('hidden');
                if (providers.length === 0 && offset === 0) {
                    resultsContainer.innerHTML =
                        `<div class="col-span-full py-12 text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <h3 class="mt-4 text-lg font-medium text-gray-700">No providers found</h3>
                            <p class="mt-2 text-gray-500">Try adjusting your search filters</p>
                        </div>`;
                    resultsCount.textContent = "0 providers found";
                    return;
                }
                providers.forEach(provider => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-xl shadow p-5 border border-gray-100 hover:shadow-lg transition-all duration-200 transform hover:-translate-y-1 cursor-pointer';
                    card.addEventListener('click', () => {
                        if (provider.type === 'doctor') {
                            window.location.href = `doctors.html?id=${provider.id}`;
                        } else if (provider.type === 'diagnostic') {
                            window.location.href = `DiagnosticsAppointments.html?id=${provider.id}`;
                        }
                    });
                    const fullAddress = provider.address;
                    const typeIcon = provider.type === 'doctor' ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>';
                    card.innerHTML = provider.type === 'doctor' ?
                        `<div class="flex items-start mb-3"> <div class="bg-blue-100 p-2 rounded-lg mr-3">${typeIcon}</div>
                        <div> <h4 class="text-lg font-bold text-gray-800">${provider.name}</h4>
                            <p class="text-blue-600 font-medium">${provider.specialization || ''}</p>
                            </div> </div> <p class="text-sm text-gray-600 mb-2">${provider.clinic || ''}</p>
                            <div class="flex items-center text-sm text-gray-500 mt-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg> ${fullAddress}
                            </div>
                            <div class="mt-3 text-sm text-blue-600 flex items-center"> View doctor details
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </div>` :
                        `<div class="flex items-start mb-3">
                            <div class="bg-green-100 p-2 rounded-lg mr-3">${typeIcon}</div>
                            <div>
                                <h4 class="text-lg font-bold text-gray-800">${provider.name}</h4>
                                <p class="text-sm text-gray-600">${(provider.services || []).join(', ')}</p>
                            </div>
                        </div>
                        <div class="flex items-center text-sm text-gray-500 mt-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg> ${fullAddress}
                        </div>
                        <div class="mt-3 text-sm text-green-600 flex items-center"> View diagnostic center details
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </div>`;
                    resultsContainer.appendChild(card);
                });
                resultsCount.textContent = `${displayedProviders.length} providers found`;
            };

            const filterAndDisplayProviders = async () => {

                const providerType = providerTypeSelect.value;
                const country = countrySelect.value;
                const state = stateSelect.value;
                const zipCode = zipInput.value;

                selectedArea = null;

                loadingSection.classList.remove('hidden');

                let doctors = [];
                let diagnostics = [];

                // 🔹 Doctors
                if (providerType === "all" || providerType === "doctor") {

                    const res = await fetch(`https://www.24x7health.in/api/doctors/search?country=${country}&state=${state}&zipcode=${zipCode}`);
                    doctors = await res.json();

                    doctors = doctors.map(d => ({
                        id: d.uid,
                        type: "doctor",
                        name: `Dr. ${d.first_name} ${d.last_name}`,
                        specialization: d.specialization,
                        clinic: d.clinic,
                        area: d.area,
                        address: `${d.door_no}, ${d.area}, ${d.city}, ${d.state}, ${d.country} - ${d.zipcode}`
                    }));
                }

                // 🔹 Diagnostics
                if (providerType === "all" || providerType === "diagnostic") {

                    const res = await fetch(`https://www.24x7health.in/api/diagnostics/search?country=${country}&state=${state}&zipcode=${zipCode}`);
                    const data = await res.json();

                    diagnostics = data.map(d => ({
                        id: d.center_id,
                        type: "diagnostic",
                        name: d.center_name,
                        services: JSON.parse(d.services || "[]"),
                        area: d.area,
                        address: `${d.address}, ${d.area}, ${d.city}, ${d.state}, ${d.country} - ${d.pincode}`
                    }));
                }

                loadingSection.classList.add('hidden');

                // 🔹 merge results
                displayedProviders = [...doctors, ...diagnostics];

                offset = 0;
                resultsContainer.innerHTML = '';

                await loadAreaButtons();

                displayProvidersBatch(displayedProviders.slice(0, BATCH_SIZE));
            };
            
            const clearFilters = () => {
                providerTypeSelect.value = "all";
                countrySelect.value = "";
                stateSelect.innerHTML = '<option value="">Select State</option>';
                zipInput.value = "";
                displayedProviders = allProviders;
                offset = 0;
                resultsContainer.innerHTML = '';
                displayProvidersBatch(displayedProviders.slice(offset, offset + BATCH_SIZE));
            };

            searchButton.addEventListener('click', filterAndDisplayProviders);
            clearFiltersBtn.addEventListener('click', clearFilters);
            zipInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    filterAndDisplayProviders();
                }
            });
            // Infinite scroll logic
            resultsContainer.addEventListener('scroll', () => {
                if (resultsContainer.scrollTop + resultsContainer.clientHeight >= resultsContainer.scrollHeight - 100) {
                    fetchAndAppendProviders();
                }
            });
            loadCountries();
        });
    </script>
</body>
</html>
