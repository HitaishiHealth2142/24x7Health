<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instant Video Consultation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7fa;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.doctor-card{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;

}

.doctor-info{
display:flex;
align-items:center;
gap:15px;
}

.doctor-img{

width:60px;
height:60px;
border-radius:50%;
object-fit:cover;

}

.join-btn{

background:#28a745;
border:none;
padding:10px 20px;
color:white;
border-radius:5px;
cursor:pointer;

}

.join-btn:hover{
background:#218838;
}

.status{

color:#28a745;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>Instant Video Consultation</h1>

<div id="doctorList">Loading doctors...</div>

</div>

<script>

const socket = io("https://24x7health.in");

const patientName = localStorage.getItem("fullName") || "Patient";
const patientId = localStorage.getItem("patientId");

/* ------------------------------
LOAD ONLINE DOCTORS
------------------------------ */

async function loadOnlineDoctors(){

try{

const res = await fetch("/api/online-doctors");

const doctors = await res.json();

const container = document.getElementById("doctorList");

if(!doctors || doctors.length===0){

container.innerHTML = "<p>No doctors available right now.</p>";

return;

}

container.innerHTML="";

doctors.forEach(doc=>{

const card = document.createElement("div");

card.className="doctor-card";

card.innerHTML = `

<div class="doctor-info">

<img src="${doc.profile_image_url || 'https://placehold.co/60'}" class="doctor-img">

<div>

<h3>Dr. ${doc.first_name} ${doc.last_name}</h3>

<p>${doc.specialization}</p>

<span class="status">Available Now</span>

</div>

</div>

<button class="join-btn" onclick="startConsult('${doc.uid}')">

Join Video

</button>

`;

container.appendChild(card);

});

}catch(err){

console.error(err);

document.getElementById("doctorList").innerHTML="Failed to load doctors";

}

}

/* ------------------------------
START CONSULTATION
------------------------------ */

function startConsult(doctorUid){

if(!patientId){

alert("Please login as patient");

window.location.href="login.html";

return;

}

const roomId = "room_" + Date.now();

socket.emit("join-call-room",{

roomId:roomId,
doctorUid:doctorUid,
patientId:patientId,
patientName:patientName

});

window.location.href="meet.html?roomId="+roomId;

}

/* ------------------------------
INIT
------------------------------ */

loadOnlineDoctors();

</script>

</body>
</html>
